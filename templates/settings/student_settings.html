<!-- templates/settings/student_settings.html -->

{% extends 'dashboard/student_base.html' %}
{% load static %}
{% load i18n %}

{% block content %}

<style>

body{
    background:#f4f7fc;
    font-family:Arial,sans-serif;
}

.settings-box{
    max-width:950px;
    margin:40px auto;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.settings-header{
    margin-bottom:35px;
}

.settings-header h2{
    font-size:30px;
    font-weight:700;
    color:#111827;
    margin-bottom:10px;
}

.settings-header p{
    color:#6b7280;
    font-size:15px;
}

.profile-section{
    display:flex;
    align-items:center;
    gap:25px;
    margin-bottom:35px;
    flex-wrap:wrap;
}

.profile-image{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #2563eb;
}

.upload-btn{
    background:#eff6ff;
    color:#2563eb;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    border:1px solid #bfdbfe;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:8px;
    font-weight:600;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:12px;
}

.full-width{
    grid-column:1/-1;
}

.switch-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    border:1px solid #e5e7eb;
    border-radius:14px;
    margin-top:18px;
    background:#fafafa;
}

.save-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 28px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    margin-top:30px;
}

@media(max-width:768px){

    .settings-box{
        margin:20px;
        padding:20px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

}

</style>

<div class="settings-box">

    <div class="settings-header">

        <h2>🎓 Student Settings</h2>

        <p>
            Update your profile and preferences.
        </p>

    </div>

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <!-- PROFILE -->
        <div class="profile-section">

            {% if user.profile_image %}
                <img src="{{ user.profile_image.url }}"
                     class="profile-image"
                     id="previewImage">
            {% else %}
                <img src="{% static 'images/default-user.png' %}"
                     class="profile-image"
                     id="previewImage">
            {% endif %}

            <label class="upload-btn">

                📸 Upload Photo

                <input type="file"
                       name="profile_image"
                       id="profileInput"
                       hidden>

            </label>

        </div>

        <div class="form-grid">

            <div class="form-group">

                <label>Username</label>

                <input type="text"
                       name="username"
                       value="{{ user.username }}">

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email"
                       name="email"
                       value="{{ user.email }}">

            </div>

            <div class="form-group">

                <label>Phone</label>

                <input type="text"
                       name="phone"
                       value="{{ user.phone }}">

            </div>

            <div class="form-group">

                <label>Date of Birth</label>

                <input type="date"
                       name="dob"
                       value="{{ user.dob|date:'Y-m-d' }}">

            </div>

            <div class="form-group">

                <label>Gender</label>

                <select name="gender">

                    <option value="">Select</option>

                    <option value="Male"
                    {% if user.gender == "Male" %}
                    selected
                    {% endif %}
                    >
                        Male
                    </option>

                    <option value="Female"
                    {% if user.gender == "Female" %}
                    selected
                    {% endif %}
                    >
                        Female
                    </option>

                    <option value="Other"
                    {% if user.gender == "Other" %}
                    selected
                    {% endif %}
                    >
                        Other
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Language</label>

                <select name="language">

                    {% for code,name in languages %}

                    <option value="{{ code }}"
                    {% if settings_obj.language == code %}
                    selected
                    {% endif %}
                    >
                        {{ name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="form-group full-width">

                <label>Address</label>

                <textarea rows="4"
                          name="address">{{ user.address }}</textarea>

            </div>

        </div>

        <!-- SETTINGS -->

        <!-- <div class="switch-row">
            <label>🌙 Dark Mode</label>
            <input type="checkbox"
                   name="dark_mode"
                   {% if settings_obj.dark_mode %}
                   checked
                   {% endif %}>
        </div>

        <div class="switch-row">
            <label>📧 Email Notifications</label>
            <input type="checkbox"
                   name="email_notifications"
                   {% if settings_obj.email_notifications %}
                   checked
                   {% endif %}>
        </div>

        <div class="switch-row">
            <label>🔔 Push Notifications</label>
            <input type="checkbox"
                   name="push_notifications"
                   {% if settings_obj.push_notifications %}
                   checked
                   {% endif %}>
        </div> -->

        <button type="submit"
                class="save-btn">

            💾 Save Changes

        </button>

    </form>

</div>

<script>

const profileInput =
document.getElementById("profileInput");

const previewImage =
document.getElementById("previewImage");

profileInput.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(file){

        previewImage.src =
        URL.createObjectURL(file);

    }

});

</script>

{% endblock %}
