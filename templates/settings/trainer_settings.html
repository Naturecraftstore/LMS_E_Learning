{% extends 'dashboard/trainer_base.html' %}
{% load static %}
{% load i18n %}

{% block content %}

<style>

body{
    background:#f4f7fc;
    font-family:Arial,sans-serif;
}

/* MAIN BOX */
.settings-box{
    max-width:950px;
    margin:40px auto;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
.settings-header{
    margin-bottom:35px;
}

.settings-header h2{
    font-size:30px;
    font-weight:700;
    color:#111827;
    margin-bottom:10px;
}

.settings-header p{
    color:#6b7280;
    font-size:15px;
}

/* PROFILE */
.profile-section{
    display:flex;
    align-items:center;
    gap:25px;
    margin-bottom:35px;
    flex-wrap:wrap;
}

.profile-image{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #2563eb;
    box-shadow:0 5px 15px rgba(37,99,235,0.2);
}

.upload-btn{
    background:#eff6ff;
    color:#2563eb;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    border:1px solid #bfdbfe;
    transition:0.3s;
    display:inline-block;
}

.upload-btn:hover{
    background:#dbeafe;
}

/* FORM */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:8px;
    font-weight:600;
    color:#111827;
    font-size:14px;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:12px;
    outline:none;
    font-size:14px;
    transition:0.3s;
    background:white;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,0.1);
}

/* FULL WIDTH */
.full-width{
    grid-column:1/-1;
}

/* SWITCH */
.switch-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    border:1px solid #e5e7eb;
    border-radius:14px;
    margin-top:18px;
    background:#fafafa;
}

.switch-row label{
    font-weight:600;
    color:#111827;
}

.switch-row input[type="checkbox"]{
    width:22px;
    height:22px;
    accent-color:#2563eb;
}

/* BUTTON */
.save-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 28px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    margin-top:30px;
    transition:0.3s;
}

.save-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

/* MOBILE */
@media(max-width:768px){

    .settings-box{
        padding:20px;
        margin:20px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .profile-section{
        flex-direction:column;
        text-align:center;
    }

    .save-btn{
        width:100%;
    }

}

</style>

<div class="settings-box">

    <!-- HEADER -->
    <div class="settings-header">

        <h2>
            ⚙ Trainer Profile Settings
        </h2>

        <p>
            Update your trainer profile, teaching details and preferences.
        </p>

    </div>

    <!-- PROFILE -->
    <div class="profile-section">

        {% if user.profile_image %}
            <img src="{{ user.profile_image.url }}"
                 class="profile-image"
                 id="previewImage">
        {% else %}
            <img src="{% static 'images/default-user.png' %}"
                 class="profile-image"
                 id="previewImage">
        {% endif %}

        <div>

            <label class="upload-btn">

                📸 Upload Profile Photo

                <input type="file"
                       name="profile_image"
                       id="profileInput"
                       hidden>

            </label>

        </div>

    </div>

    <!-- FORM -->
    <form method="POST"
      enctype="multipart/form-data">

    {% csrf_token %}

    <!-- PROFILE -->
    <div class="profile-section">

        <!-- {% if user.profile_image %}
            <img src="{{ user.profile_image.url }}"
                 class="profile-image"
                 id="previewImage">
        {% else %}
            <img src="{% static 'images/default-user.png' %}"
                 class="profile-image"
                 id="previewImage">
        {% endif %} -->

        <div>

            <!-- <label class="upload-btn">

                📸 Upload Profile Photo

                <input type="file"
                       name="profile_image"
                       id="profileInput"
                       hidden>

            </label> -->

        </div>

    </div>

    <div class="form-grid">

        <!-- USERNAME -->
        <div class="form-group">

            <label>Username</label>

            <input type="text"
                   name="username"
                   value="{{ user.username }}">

        </div>

        <!-- EMAIL -->
        <div class="form-group">

            <label>Email Address</label>

            <input type="email"
                   name="email"
                   value="{{ user.email }}">

        </div>

        <!-- PHONE -->
        <div class="form-group">

            <label>Phone Number</label>

            <input type="text"
                   name="phone"
                   value="{{ user.phone }}">

        </div>

        <!-- LANGUAGE -->
        <div class="form-group">

            <label>🌐 Preferred Language</label>

            <select name="language">

                {% for code,name in languages %}

                <option value="{{ code }}"
                {% if settings_obj.language == code %}
                    selected
                {% endif %}
                >
                    {{ name }}
                </option>

                {% endfor %}

            </select>

        </div>

        <!-- SPECIALIZATION -->
        <div class="form-group">

            <label>Specialization</label>

            <input type="text"
                   name="specialization"
                   value="{{ user.specialization }}">

        </div>

        <!-- EXPERIENCE -->
        <div class="form-group">

            <label>Experience</label>

            <input type="number"
                   name="experience"
                   value="{{ user.experience }}">

        </div>

        <!-- GENDER -->
        <div class="form-group">

            <label>Gender</label>

            <select name="gender">

                <option value="">Select Gender</option>

                <option value="Male"
                {% if user.gender == "Male" %}
                    selected
                {% endif %}
                >
                    Male
                </option>

                <option value="Female"
                {% if user.gender == "Female" %}
                    selected
                {% endif %}
                >
                    Female
                </option>

                <option value="Other"
                {% if user.gender == "Other" %}
                    selected
                {% endif %}
                >
                    Other
                </option>

            </select>

        </div>

        <!-- QUALIFICATION -->
        <div class="form-group">

            <label>Qualification</label>

            <input type="text"
                   name="qualification"
                   value="{{ user.qualification }}">

        </div>

        <!-- BIO -->
        <div class="form-group full-width">

            <label>Professional Bio</label>

            <textarea rows="5"
                      name="bio">{{ user.bio }}</textarea>

        </div>

        <!-- ADDRESS -->
        <div class="form-group full-width">

            <label>Address</label>

            <textarea rows="4"
                      name="address">{{ user.address }}</textarea>

        </div>

    </div>

    <button type="submit"
            class="save-btn">

        💾 Save Changes

    </button>

</form>

</div>

<!-- JS -->
<script>

const profileInput =
document.getElementById("profileInput");

const previewImage =
document.getElementById("previewImage");

if(profileInput){

    profileInput.addEventListener("change", function(e){

        const file = e.target.files[0];

        if(file){

            previewImage.src =
                URL.createObjectURL(file);

        }

    });

}

</script>

{% endblock %}
