{% extends "dashboard/trainer_base.html" %}

{% block content %}

<style>
    /* --- TEAMS DASHBOARD THEME --- */
    .dashboard-container {
        padding: 40px;
        background-color: #f5f5f5; /* Light gray background like Teams */
        min-height: 100vh;
    }

    .page-header {
        margin-bottom: 30px;
        padding-left: 10px;
    }

    .page-header h2 {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        color: #242424;
        font-size: 24px;
        font-weight: 600;
    }

    .course-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    /* CARD DESIGN */
    .course-card {
        background: white;
        border: 1px solid #e1dfdd;
        border-radius: 8px;
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none; /* Remove underline from <a> */
        display: flex;
        flex-direction: column;
        cursor: pointer;
    }

    .course-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        border-color: #5b5fc7;
    }

    /* Card Top Decoration (Teams uses colored headers for teams) */
    .card-banner {
        height: 80px;
        background: linear-gradient(135deg, #5b5fc7 0%, #464775 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 32px;
        font-weight: bold;
    }

    .card-body {
        padding: 16px;
        background: white;
        text-align: center;
    }

    .card-body h3 {
        margin: 0;
        font-size: 16px;
        color: #242424;
        font-family: 'Segoe UI', sans-serif;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .card-footer {
        padding: 12px;
        border-top: 1px solid #f3f2f1;
        text-align: center;
        font-size: 12px;
        color: #616161;
    }

    /* Remove default link styling */
    .course-link {
        text-decoration: none;
        color: inherit;
    }
</style>

<div class="dashboard-container">
    <div class="page-header">
        <h2>Your Courses</h2>
    </div>

    <div class="course-grid">
        {% for course in courses %}
        <a href="{% url 'teams:course_teams' course.id %}" class="course-link">
            <div class="course-card">
                <!-- Banner with Initials like Teams -->
                <div class="card-banner">
                    {{ course.title|slice:":1"|upper }}
                </div>
                
                <div class="card-body">
                    <h3>{{ course.title }}</h3>
                </div>

                <div class="card-footer">
                    View Teams & Chat
                </div>
            </div>
        </a>
        {% empty %}
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #616161;">
            <p>No courses available at the moment.</p>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
