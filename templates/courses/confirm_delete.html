{% extends 'dashboard/trainer_base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet"
href="{% static 'courses/css/delete_topic.css' %}">

<div class="delete-container">

    <h2 class="delete-title">
        ⚠️ Delete Topic
    </h2>

    <p class="delete-text">
        Are you sure you want to delete this topic?
    </p>

    <div class="topic-name">
        {{ topic.name }}
    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="button-group">

            <button type="submit" class="delete-btn">
                Yes, Delete
            </button>

            <a href="{% url 'trainer_courses' %}"
               class="cancel-btn">
                Cancel
            </a>

        </div>

    </form>

</div>

<script src="{% static 'courses/js/delete_topic.js' %}"></script>

{% endblock %}
