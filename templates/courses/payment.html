{% extends 'dashboard/student_base.html' %}
{% block content %}
{% load static %}

<link rel="stylesheet"
href="{% static 'courses/css/payment.css' %}">
<div class="payment-box">

    <h2>💳 Pay for {{ course.title }}</h2>

    <div class="amount">
        Amount: ₹{{ course.price }}
    </div>

    <button id="pay-btn" class="btn">
        Pay Now
    </button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

/* ===== DJANGO VARIABLES ===== */

const razorpayKey =
"{{ key }}";

const razorpayAmount =
"{{ order.amount }}";

const razorpayOrderId =
"{{ order.id }}";

const courseTitle =
"{{ course.title }}";

const paymentSuccessUrl =
"{% url 'payment_success' course.id %}";

const studentCoursesUrl =
"{% url 'assigned_courses' %}";

const currentUserId =
"{{ request.user.id }}";


/* ===== GET CSRF TOKEN ===== */

function getCookie(name) {

    let cookieValue = null;

    if (document.cookie) {

        document.cookie.split(';').forEach(c => {

            c = c.trim();

            if (c.startsWith(name + '=')) {

                cookieValue = decodeURIComponent(
                    c.substring(name.length + 1)
                );
            }
        });
    }

    return cookieValue;
}


/* ===== PAYMENT BUTTON ===== */

const payBtn =
document.getElementById("pay-btn");


payBtn.onclick = function(e) {

    e.preventDefault();

    const options = {

        key: razorpayKey,

        amount: razorpayAmount,

        currency: "INR",

        name: "LMS Platform",

        description: courseTitle,

        order_id: razorpayOrderId,

        handler: function(response) {

            fetch(paymentSuccessUrl, {

                method: "POST",

                headers: {

                    "Content-Type": "application/json",

                    "X-CSRFToken":
                    getCookie("csrftoken")
                },

                body: JSON.stringify({

                    razorpay_payment_id:
                    response.razorpay_payment_id,

                    razorpay_order_id:
                    response.razorpay_order_id,

                    razorpay_signature:
                    response.razorpay_signature
                })
            })

            .then(res => res.json())

            .then(data => {

                if(data.status == "success") {

                    alert("✅ Payment Successful");

                    window.location.href =
                    studentCoursesUrl;

                } else {

                    alert("❌ Payment Failed");
                }
            });

        },

        theme: {

            color: "#2563eb"
        }
    };

    const rzp =
    new Razorpay(options);

    rzp.open();
};

</script>
{% endblock %}
