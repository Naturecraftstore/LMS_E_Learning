{% extends 'dashboard/student_base.html' %}
{% load static %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-dark text-white">
            <h3>{{ task.title }}</h3>
        </div>

        <div class="card-body">

            <p>{{ task.description }}</p>

            <hr>

            <h5>Starter Code</h5>

            <pre>{{ task.starter_code }}</pre>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label>Your Code</label>

                    <textarea
                        name="submitted_code"
                        class="form-control"
                        rows="12"
                        required
                    ></textarea>
                </div>

                <button type="submit" class="btn btn-success">
                    Submit Solution
                </button>

            </form>

        </div>

    </div>

</div>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

/* =========================
   GLOBAL
========================= */

body{
    background:
        radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 22%),
        radial-gradient(circle at bottom right, rgba(99,102,241,0.10), transparent 24%),
        linear-gradient(180deg,#f8fbff 0%,#eef2ff 100%);

    font-family:'Inter',sans-serif;
    color:#0f172a;
    min-height:100vh;
}

/* =========================
   CONTAINER
========================= */

.container{
    max-width:980px;
    margin-top:45px;
    perspective:1800px;
}

/* =========================
   MAIN FLOATING CARD
========================= */

.card{
    position:relative;
    overflow:hidden;

    border:none !important;
    border-radius:28px !important;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.96),
            rgba(248,250,252,0.92)
        );

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    transform-style:preserve-3d;

    box-shadow:
        0 1px 0 rgba(255,255,255,0.9) inset,
        0 25px 60px rgba(15,23,42,0.08),
        0 45px 90px rgba(59,130,246,0.10);

    transition:all .45s cubic-bezier(.22,1,.36,1);
}

/* glossy layer */
.card::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            120deg,
            rgba(255,255,255,0.45),
            transparent 40%
        );

    pointer-events:none;
}

/* neon top border */
.card::after{
    content:"";
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:6px;

    background:
        linear-gradient(
            90deg,
            #38bdf8,
            #3b82f6,
            #6366f1,
            #8b5cf6
        );

    box-shadow:
        0 0 20px rgba(99,102,241,0.45);
}

.card:hover{
    transform:
        translateY(-10px)
        rotateX(2deg)
        rotateY(-2deg);

    box-shadow:
        0 35px 80px rgba(15,23,42,0.14),
        0 60px 120px rgba(59,130,246,0.14);
}

/* =========================
   HEADER
========================= */

.card-header{
    position:relative;
    overflow:hidden;

    border:none !important;

    padding:26px 32px;

    background:
        linear-gradient(
            135deg,
            #0f172a,
            #1e293b
        ) !important;
}

/* glow orb */
.card-header::before{
    content:"";
    position:absolute;

    width:220px;
    height:220px;

    background:rgba(255,255,255,0.06);

    border-radius:50%;

    top:-140px;
    right:-60px;
}

/* second glow */
.card-header::after{
    content:"";
    position:absolute;

    width:120px;
    height:120px;

    background:rgba(59,130,246,0.18);

    border-radius:50%;

    bottom:-70px;
    left:-20px;
}

.card-header h3{
    position:relative;
    z-index:2;

    margin:0;

    color:#ffffff;

    font-size:1.55rem;
    font-weight:800;
    letter-spacing:-0.5px;

    text-shadow:
        0 2px 10px rgba(0,0,0,0.25);
}

/* =========================
   BODY
========================= */

.card-body{
    padding:34px;
    position:relative;
    z-index:2;
}

/* =========================
   DESCRIPTION
========================= */

.card-body p{
    color:#475569;
    line-height:1.8;
    font-size:0.97rem;
}

/* divider */
hr{
    border:none;
    height:1px;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(148,163,184,0.35),
            transparent
        );

    margin:28px 0;
}

/* =========================
   SUBTITLE
========================= */

h5{
    margin-bottom:16px;

    font-size:1.05rem;
    font-weight:800;

    color:#0f172a;
}

/* =========================
   CODE BLOCK
========================= */

pre{
    position:relative;

    background:
        linear-gradient(
            145deg,
            #0f172a,
            #111827
        );

    color:#7dd3fc;

    padding:22px;
    border-radius:20px;

    overflow-x:auto;

    font-size:13px;
    line-height:1.7;

    border:
        1px solid rgba(56,189,248,0.12);

    box-shadow:
        inset 0 2px 12px rgba(0,0,0,0.55),
        0 18px 35px rgba(15,23,42,0.18);

    font-family:
        'JetBrains Mono',
        'Fira Code',
        monospace;
}

/* terminal dots */
pre::before{
    content:"";
    position:absolute;
    top:14px;
    left:18px;

    width:12px;
    height:12px;

    border-radius:50%;

    background:#ef4444;

    box-shadow:
        20px 0 #f59e0b,
        40px 0 #10b981;
}

/* spacing from top */
pre{
    padding-top:42px;
}

/* =========================
   LABEL
========================= */

label{
    font-size:0.92rem;
    font-weight:700;
    color:#334155;

    margin-bottom:10px;
    display:block;
}

/* =========================
   CODE EDITOR TEXTAREA
========================= */

textarea.form-control{
    min-height:340px;

    border:none;

    border-radius:22px;

    background:
        linear-gradient(
            145deg,
            #f8fafc,
            #eef2ff
        );

    padding:22px;

    color:#0f172a;

    font-size:13px;
    line-height:1.8;

    font-family:
        'JetBrains Mono',
        'Fira Code',
        monospace;

    box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.8),
        inset 0 -3px 10px rgba(148,163,184,0.10),
        0 12px 30px rgba(15,23,42,0.05);

    transition:all .25s ease;

    resize:vertical;
}

/* focus state */
textarea.form-control:focus{
    background:#ffffff;

    transform:
        translateY(-2px)
        scale(1.005);

    box-shadow:
        0 0 0 5px rgba(59,130,246,0.12),
        0 25px 45px rgba(59,130,246,0.12);

    outline:none;
}

/* =========================
   BUTTON
========================= */

.btn-success{
    position:relative;
    overflow:hidden;

    border:none;

    border-radius:18px;

    padding:15px 28px;

    font-size:0.96rem;
    font-weight:800;

    color:#ffffff;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #3b82f6,
            #6366f1
        );

    box-shadow:
        0 12px 0 rgba(59,130,246,0.18),
        0 24px 40px rgba(59,130,246,0.24);

    transition:all .22s ease;
}

/* shine animation */
.btn-success::before{
    content:"";
    position:absolute;

    top:0;
    left:-120%;

    width:60%;
    height:100%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.55),
            transparent
        );

    transform:skewX(-20deg);

    transition:.7s;
}

.btn-success:hover::before{
    left:130%;
}

.btn-success:hover{
    transform:
        translateY(-4px)
        scale(1.02);

    box-shadow:
        0 18px 0 rgba(59,130,246,0.14),
        0 38px 60px rgba(59,130,246,0.30);
}

.btn-success:active{
    transform:translateY(5px);

    box-shadow:
        0 6px 0 rgba(59,130,246,0.16),
        0 12px 20px rgba(59,130,246,0.20);
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .container{
        margin-top:20px;
        padding:0 12px;
    }

    .card-body{
        padding:20px;
    }

    .card:hover{
        transform:none;
    }

    textarea.form-control{
        min-height:250px;
    }

    .card-header{
        padding:22px;
    }

    .card-header h3{
        font-size:1.2rem;
    }

    .btn-success{
        width:100%;
    }
}
</style>


{% endblock %}
