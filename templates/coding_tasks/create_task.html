{% extends 'dashboard/admin_dashboard.html' %}
{% load static %}

{% block content %}

<div class="container mt-4">
        <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-dark text-white">
            <h3>Create Coding Task</h3>
        </div>

        <div class="card-body">

            <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label>Task Title</label>
        <input type="text" name="title" class="form-control">
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea name="description" class="form-control"></textarea>
    </div>

    <div class="mb-3">
        <label>Difficulty</label>
        <select name="difficulty" class="form-control">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Marks</label>
        <input type="number" name="marks" class="form-control">
    </div>

    <div class="mb-3">
        <label>Starter Code</label>
        <textarea name="starter_code" class="form-control"></textarea>
    </div>

    <div class="mb-3">
        <label>Expected Output</label>
        <textarea name="expected_output" class="form-control"></textarea>
    </div>

    <div class="mb-3">
        <label>Course</label>

        <select name="course" class="form-control">
            {% for course in courses %}
                <option value="{{ course.id }}">
                    {{ course.title }}
                </option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="btn btn-success">
        Create Task
    </button>

</form>  

            

        </div>
    </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

/* =========================
   GLOBAL
========================= */

body{
    background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 22%),
        radial-gradient(circle at bottom right, rgba(99,102,241,0.10), transparent 24%),
        linear-gradient(180deg,#f8fbff 0%,#eef2ff 100%);

    color:#0f172a;
    min-height:100vh;
}

/* =========================
   LAYOUT
========================= */

.container{
    max-width:1050px;
    margin-top:40px;
    perspective:1800px;
}

/* =========================
   ULTRA 3D CARD
========================= */

.card{
    position:relative;
    overflow:hidden;

    background:
        linear-gradient(145deg,
        rgba(255,255,255,0.96),
        rgba(248,250,252,0.95));

    border-radius:28px !important;
    border:1px solid rgba(255,255,255,0.7);

    transform-style:preserve-3d;

    box-shadow:
        0 1px 0 rgba(255,255,255,0.9) inset,
        0 20px 50px rgba(15,23,42,0.08),
        0 45px 80px rgba(59,130,246,0.08);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    transition:all .45s cubic-bezier(.22,1,.36,1);
}

/* floating holographic effect */
.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(
            120deg,
            rgba(255,255,255,0.55) 0%,
            rgba(255,255,255,0.02) 35%,
            rgba(99,102,241,0.05) 100%
        );
    pointer-events:none;
}

/* glowing border */
.card::after{
    content:"";
    position:absolute;
    top:-2px;
    left:-2px;
    right:-2px;
    height:7px;
    border-radius:30px 30px 0 0;

    background:
        linear-gradient(
            90deg,
            #38bdf8,
            #3b82f6,
            #6366f1,
            #8b5cf6
        );

    box-shadow:
        0 0 18px rgba(99,102,241,0.45);
}

.card:hover{
    transform:
        translateY(-10px)
        rotateX(2deg)
        rotateY(-2deg);

    box-shadow:
        0 1px 0 rgba(255,255,255,0.95) inset,
        0 35px 70px rgba(15,23,42,0.14),
        0 70px 120px rgba(99,102,241,0.14);
}

/* =========================
   HEADER
========================= */

.card-header{
    background:
        linear-gradient(
            135deg,
            rgba(15,23,42,0.98),
            rgba(30,41,59,0.96)
        ) !important;

    border:none !important;
    padding:24px 30px;

    position:relative;
    overflow:hidden;
}

/* animated glow orb */
.card-header::before{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;

    right:-60px;
}

/* second orb */

    position:absolute;

/* =========================
   INPUTS
========================= */

        linear-gradient(

/* glossy shine */
.btn-success::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;

        linear-gradient(

</style>
