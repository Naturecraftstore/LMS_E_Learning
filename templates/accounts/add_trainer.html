{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}Add Student{% endblock %}

{% block content %}



<link rel="stylesheet" href="{% static 'accounts/css/add_trainer.css' %}">

<div class="form-container">

    <h2 class="form-title">Add Trainer</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label>Email</label>
            {{ form.email }}
        </div>

        <div class="form-group">
            <label>Phone</label>
            {{ form.phone }}
        </div>

        <div class="form-group">
            <label>Password</label>
            {{ form.password }}
        </div>

        <!-- CLEAN MULTI SELECT -->
        <div class="form-group">
            <label>Assign Courses</label>
            {{ form.courses }}
        </div>

        <div class="form-group">
            <label>Assign Students</label>
            {{ form.students }}
        </div>

        <button type="submit" class="btn">Create Trainer</button>

    </form>

</div>

{% endblock %}
