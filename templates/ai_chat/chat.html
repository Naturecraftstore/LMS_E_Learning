<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>

    <style>

    body{
        font-family:Arial;
        background:#f4f6f9;
        margin:0;
    }

    .chat-box{
        width:90%;
        max-width:800px;
        margin:30px auto;
        background:white;
        border-radius:10px;
        padding:20px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    #messages{
        height:500px;
        overflow-y:auto;
        border:1px solid #ddd;
        padding:15px;
        border-radius:10px;
        margin-bottom:15px;
    }

    .user{
        text-align:right;
        margin:10px 0;
    }

    .ai{
        text-align:left;
        margin:10px 0;
    }

    .bubble{
        display:inline-block;
        padding:10px 15px;
        border-radius:10px;
        max-width:70%;
    }

    .user .bubble{
        background:#2563eb;
        color:white;
    }

    .ai .bubble{
        background:#e5e7eb;
    }

    .input-box{
        display:flex;
        gap:10px;
    }

    input{
        flex:1;
        padding:12px;
        border-radius:8px;
        border:1px solid #ccc;
    }

    button{
        padding:12px 20px;
        border:none;
        background:#2563eb;
        color:white;
        border-radius:8px;
        cursor:pointer;
    }

    </style>
</head>
<body>

<div class="chat-box">

    <h2>🤖 AI LMS Assistant</h2>

    <div id="messages"></div>

    <div class="input-box">
        <input type="text" id="msg" placeholder="Ask anything...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

async function sendMessage(){

    let input = document.getElementById("msg");

    let message = input.value;

    if(message.trim() === "") return;

    let messages = document.getElementById("messages");

    messages.innerHTML += `
        <div class="user">
            <div class="bubble">${message}</div>
        </div>
    `;

    input.value = "";

    let response = await fetch("/ai-chat/ask/",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:message
        })
    });

    let data = await response.json();

    messages.innerHTML += `
        <div class="ai">
            <div class="bubble">${data.reply}</div>
        </div>
    `;

    messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
